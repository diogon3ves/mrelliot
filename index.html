<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Acesso</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border-top: 6px solid #e74c3c;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #2d3436;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #636e72;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="icon">⚠️</span>
        <h1>Acesso Negado</h1>
        <p>Erro: Seu aparelho não está ativo para esta operação. Entre em contato com o suporte para regularizar o acesso.</p>
    </div>

</body>
</html>
